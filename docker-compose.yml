# Replication stack for the per-chunk vs per-document contextual-retrieval experiment.
# Postgres (state) + Milvus 2.5 (dense vector store, with etcd + minio) + the FastAPI
# ingest/benchmark core. The API runs in `header` auth mode (no service token) and is
# published on :8000 so scripts/e2e_bulk.py can drive it from the host.
#
# Required in .env: RAG_ANTHROPIC_API_KEY + RAG_EMBEDDING_API_KEY (Voyage). See .env.example.
# Keyless wiring check needs no stack — see README (smoke_fake.py / smoke_eval.py).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: company_brain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    # 2.5+ for the vector store. (Dense-only is used here; 2.5 also supports BM25 hybrid.)
    image: milvusdb/milvus:v2.5.21
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 5
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  api:
    build: ./backend
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/company_brain
      RAG_MILVUS_URI: http://milvus:19530
      APP_BLOB_DIR: /data/blobs
      # Dev auth: identity is read from a header, no service token required.
      APP_AUTH_MODE: header
    ports:
      - "8000:8000"
    volumes:
      - blobs:/data/blobs
      - ./results:/results   # /e2e/results reads reports written here by e2e_bulk.py
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy

volumes:
  pgdata:
  etcd:
  minio:
  milvus:
  blobs:
